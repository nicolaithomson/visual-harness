name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # The guard test is zero-dependency (node:test), so no install is needed.
      - name: Guard fail-closed matrix
        run: node --test
